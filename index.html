<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ClassChat | Multimedia & Calling</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e14; --surface: #1a1f26; --primary: #00d2ff; --text: #e1e1e1; --border: #2d343f; --sidebar: #13171f; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        
        /* Auth UI */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--surface); padding: 40px; border-radius: 20px; border: 1px solid var(--border); width: 320px; text-align: center; }
        .auth-btn { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
        .google-btn { background: #fff; color: #000; }
        .guest-btn { background: var(--primary); color: #000; }

        #app { display: none; flex-direction: row; height: 100vh; }
        
        /* Sidebar & Rooms */
        #sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        #room-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .room-item { padding: 12px; margin-bottom: 5px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
        .room-item.active { background: var(--primary); color: #000; font-weight: 700; }

        /* Settings Section */
        .settings-footer { padding: 15px; border-top: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 0.85rem; }
        .settings-footer:hover { background: var(--surface); }

        /* Main Chat Area */
        #main-chat { flex-grow: 1; display: flex; flex-direction: column; position: relative; }
        header { padding: 15px 25px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .msg { display: flex; gap: 10px; }
        .pfp { width: 38px; height: 38px; border-radius: 8px; object-fit: cover; }
        .bubble { background: var(--surface); padding: 12px 16px; border-radius: 0 15px 15px 15px; border: 1px solid var(--border); max-width: 80%; }
        
        /* Video Calling Overlay */
        #video-container { display: none; position: absolute; inset: 0; background: #000; z-index: 50; }
        #jitsi-iframe { width: 100%; height: 100%; border: none; }
        .close-call { position: absolute; top: 15px; right: 15px; z-index: 60; background: #ff4757; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* Settings Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: var(--surface); padding: 30px; border-radius: 20px; width: 320px; border: 1px solid var(--border); }
        .setting-input { width: 100%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 5px; }

        .call-btn { background: var(--border); color: var(--primary); border: 1px solid var(--primary); padding: 6px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h1>ClassChat</h1>
            <button class="auth-btn google-btn" id="googleLogin">Sign in with Google</button>
            <button class="auth-btn guest-btn" id="showGuest">Enter as Guest</button>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h3>Personalization</h3>
            <label>Nickname</label>
            <input type="text" id="set-name" class="setting-input">
            <label>Aura Color</label>
            <input type="color" id="set-color" class="setting-input" style="height:40px;">
            <label>PFP URL</label>
            <input type="text" id="set-pfp" class="setting-input" placeholder="Link to image...">
            <button class="auth-btn guest-btn" id="save-settings">Save Changes</button>
        </div>
    </div>

    <div id="app">
        <div id="sidebar">
            <div class="sidebar-header">
                <span>CHATS</span>
                <button id="createRoom" style="background:none; border:none; color:var(--primary); font-size:1.5rem; cursor:pointer;">+</button>
            </div>
            <div id="room-list"></div>
            <div class="settings-footer" onclick="document.getElementById('settings-modal').style.display='flex'">
                <span>⚙️</span> <span id="user-display-name">Settings</span>
            </div>
        </div>

        <div id="main-chat">
            <header>
                <span id="current-room-name">Select a Chat</span>
                <button id="startCall" class="call-btn" style="display:none;">📞 CALL</button>
            </header>

            <div id="video-container">
                <button class="close-call" id="endCall">LEAVE</button>
                <div id="jitsi-iframe"></div>
            </div>

            <div id="messages"></div>
            <div style="padding:20px; display:flex; gap:10px; background:var(--bg);">
                <input type="text" id="msgInput" placeholder="Message..." style="flex-grow:1; background:var(--surface); border:1px solid var(--border); padding:12px; border-radius:10px; color:#fff; outline:none;">
                <button id="sendBtn" style="background:var(--primary); border:none; padding:0 25px; border-radius:10px; cursor:pointer; font-weight:bold;">21</button>
            </div>
        </div>
    </div>

    <script src='https://meet.jit.si/external_api.js'></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, off } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Use your config from image_fc32cd.png
        const firebaseConfig = {
            apiKey: "AIzaSyAQb65vp77W_SkO8mdiVuwuRqHaHJkQ0yQ",
            authDomain: "classchat-afda9.firebaseapp.com",
            projectId: "classchat-afda9",
            storageBucket: "classchat-afda9.appspot.com",
            messagingSenderId: "760785144553",
            appId: "1:760785144553:web:213269aa2676ed3f5a7e78"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app, "https://classchat-afda9-default-rtdb.europe-west1.firebasedatabase.app");
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let currentUser = JSON.parse(localStorage.getItem('cc_user')) || { name: "Guest", color: "#00d2ff", pfp: "https://api.dicebear.com/7.x/identicon/svg" };
        let currentRoomId = null;
        let jitsiApi = null;

        // AUTH LOGIC
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser.name = user.displayName;
                currentUser.pfp = user.photoURL;
                startApp();
            }
        });

        document.getElementById('googleLogin').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('showGuest').onclick = () => startApp();

        function startApp() {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('user-display-name').innerText = currentUser.name;
            loadRooms();
        }

        // PERSONALIZATION LOGIC
        document.getElementById('save-settings').onclick = () => {
            currentUser.name = document.getElementById('set-name').value || currentUser.name;
            currentUser.color = document.getElementById('set-color').value;
            currentUser.pfp = document.getElementById('set-pfp').value || currentUser.pfp;
            localStorage.setItem('cc_user', JSON.stringify(currentUser));
            document.getElementById('user-display-name').innerText = currentUser.name;
            document.getElementById('settings-modal').style.display = 'none';
        };

        // ROOM & CALLING LOGIC
        document.getElementById('startCall').onclick = () => {
            document.getElementById('video-container').style.display = 'block';
            const options = {
                roomName: "ClassChat-" + currentRoomId,
                parentNode: document.querySelector('#jitsi-iframe'),
                userInfo: { displayName: currentUser.name }
            };
            jitsiApi = new JitsiMeetExternalAPI("meet.jit.si", options);
        };

        document.getElementById('endCall').onclick = () => {
            if (jitsiApi) jitsiApi.dispose();
            document.getElementById('video-container').style.display = 'none';
        };

        document.getElementById('createRoom').onclick = () => {
            const name = prompt("Enter Chat Name:");
            if (name) push(ref(db, "rooms"), { name: name });
        };

        function loadRooms() {
            onChildAdded(ref(db, "rooms"), (snap) => {
                const room = snap.val();
                const div = document.createElement('div');
                div.className = 'room-item';
                div.innerText = "# " + room.name;
                div.onclick = () => selectRoom(snap.key, room.name, div);
                document.getElementById('room-list').appendChild(div);
            });
        }

        function selectRoom(id, name, el) {
            currentRoomId = id;
            document.querySelectorAll('.room-item').forEach(r => r.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('current-room-name').innerText = "# " + name;
            document.getElementById('startCall').style.display = 'block';
            document.getElementById('messages').innerHTML = "";
            
            off(ref(db, `room_messages/${id}`));
            onChildAdded(ref(db, `room_messages/${id}`), (snap) => {
                const d = snap.val();
                const div = document.createElement('div');
                div.className = 'msg';
                div.innerHTML = `<img src="${d.pfp}" class="pfp"><div class="bubble"><div style="font-size:0.7rem;font-weight:700;color:${d.color}">${d.sender}</div><div>${d.text}</div></div>`;
                document.getElementById('messages').appendChild(div);
                document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            });
        }

        function sendMessage() {
            const input = document.getElementById('msgInput');
            if (!input.value.trim() || !currentRoomId) return;
            push(ref(db, `room_messages/${currentRoomId}`), {
                sender: currentUser.name, text: input.value, color: currentUser.color, pfp: currentUser.pfp
            });
            input.value = "";
        }

        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('msgInput').onkeydown = (e) => { if(e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>
