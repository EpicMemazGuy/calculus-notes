<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassChat | Calculus Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --primary: #38bdf8;
            --text: #f1f5f9;
            --border: #334155;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
        }

        /* Branding Header */
        header {
            padding: 15px 25px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 { font-size: 1.2rem; margin: 0; color: var(--primary); letter-spacing: -0.5px; }
        .status { font-size: 0.7rem; font-family: 'JetBrains Mono'; opacity: 0.6; }

        /* Chat Area */
        #chat-window { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px;
        }

        .msg-container { display: flex; gap: 12px; align-items: flex-start; max-width: 80%; }
        
        .pfp { 
            width: 35px; height: 35px; border-radius: 50%; 
            background: var(--border); object-fit: cover; flex-shrink: 0;
        }

        .bubble {
            background: var(--surface);
            padding: 10px 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
            position: relative;
        }

        .sender-name { font-size: 0.7rem; font-weight: 600; margin-bottom: 4px; display: block; }
        .text-content { font-size: 0.95rem; line-height: 1.4; }

        /* Input Area */
        .input-box {
            padding: 20px;
            background: var(--bg);
            display: flex;
            gap: 10px;
            border-top: 1px solid var(--border);
        }

        input {
            flex-grow: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 15px;
            color: white;
            outline: none;
            transition: border 0.2s;
        }

        input:focus { border-color: var(--primary); }

        button {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.95); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>ClassChat <small style="font-size: 0.6rem; color: white; opacity: 0.5;">v2.0</small></h1>
        <div class="status">ENCRYPTED_SESSION_ACTIVE</div>
    </header>

    <div id="chat-window"></div>
    
    <div class="input-box">
        <input type="text" id="msgInput" placeholder="Message members..." autocomplete="off">
        <button id="sendBtn">SEND</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQb65vp77W_SkO8mdiVuwuRqHaHJkQ0yQ",
            authDomain: "classchat-afda9.firebaseapp.com",
            projectId: "classchat-afda9",
            storageBucket: "classchat-afda9.firebasestorage.app",
            messagingSenderId: "760785144553",
            appId: "1:760785144553:web:213269aa2676ed3f5a7e78"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app, "https://classchat-afda9-default-rtdb.europe-west1.firebasedatabase.app");
        const chatRef = ref(db, "messages");

        // UI Setup for user
        const username = prompt("Display Name:") || "Guest";
        const userColor = prompt("Pick a hex color (e.g. #38bdf8):") || "#38bdf8";
        const pfpUrl = prompt("PFP Image URL (or leave blank):") || "https://api.dicebear.com/7.x/avataaars/svg?seed=" + username;

        const input = document.getElementById("msgInput");
        const sendBtn = document.getElementById("sendBtn");
        const windowDiv = document.getElementById("chat-window");

        function sendMessage() {
            if (input.value.trim() !== "") {
                push(chatRef, { 
                    sender: username, 
                    message: input.value, 
                    color: userColor,
                    avatar: pfpUrl 
                });
                input.value = "";
            }
        }

        sendBtn.onclick = sendMessage;
        input.onkeydown = (e) => { if(e.key === 'Enter') sendMessage(); };

        onChildAdded(chatRef, (snapshot) => {
            const data = snapshot.val();
            const div = document.createElement("div");
            div.className = "msg-container";
            div.innerHTML = `
                <img src="${data.avatar}" class="pfp">
                <div class="bubble">
                    <span class="sender-name" style="color: ${data.color}">${data.sender}</span>
                    <div class="text-content">${data.message}</div>
                </div>
            `;
            windowDiv.appendChild(div);
            windowDiv.scrollTop = windowDiv.scrollHeight;
        });

        // Panic Key
        window.onkeydown = (e) => { if (e.key === "Escape") window.location.href = "https://en.wikipedia.org/wiki/Calculus"; };
    </script>
</body>
</html>
