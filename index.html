<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE 21 ULTIMATE DASHBOARD</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        body {
            background-color: #1a1a1a;
            color: #00ff41; /* Matrix Green */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
            text-align: center;
        }
        .container {
            background: #2a2a2a;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            max-width: 500px;
        }
        button {
            background-color: #ff4500;
            color: white;
            padding: 15px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin: 10px;
        }
        audio {
            margin-top: 20px;
            filter: invert(100%); /* Makes the player look "Dark Mode" */
        }
        #login-section { margin-bottom: 30px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-section">
            <h3>STEP 1: IDENTITY CHECK</h3>
            <div id="g_id_onload"
                 data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
                 data-callback="handleCredentialResponse">
            </div>
            <div class="g_id_signin" data-type="standard"></div>
        </div>

        <hr style="border: 0.5px solid #444; width: 100%;">

        <h3>STEP 2: THE CHAOS</h3>
        <button onclick="launchTabs()">OPEN 50 TABS (THE 21 SPECIAL)</button>

        <hr style="border: 0.5px solid #444; width: 100%;">

        <h3>STEP 3: THE VIBE (MP3 TEST)</h3>
        <p>Testing audio sending...</p>
        <audio controls>
            <source src="https://codeskulptor-demos.commondatastorage.googleapis.com/pang/paza-moduless.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </div>

    <script>
        // HANDLE GOOGLE LOGIN
        function handleCredentialResponse(response) {
            console.log("Encoded JWT ID token: " + response.credential);
            alert("Login data received in console! You're officially a certified 21-genius.");
        }

        // HANDLE TAB LAUNCHING
        function launchTabs() {
            const url = "https://youtu.be/7e0-puVc3Qw?si=uTi0PZ4rfMJ34PS7";
            for (let i = 0; i < 50; i++) {
                window.open(url, '_blank');
            }
            alert("If 50 tabs didn't open, check the 'Pop-up Blocked' icon in your URL bar!");
        }
    </script>
</body>
</html>
