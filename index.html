<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ClassChat Pro | v3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e14; --surface: #1a1f26; --primary: #00d2ff; --text: #e1e1e1; --border: #2d343f; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        
        /* Auth Overlay */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--surface); padding: 40px; border-radius: 20px; border: 1px solid var(--border); width: 350px; text-align: center; }
        .auth-card h1 { color: var(--primary); margin-bottom: 30px; }
        .auth-btn { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 14px; }
        .google-btn { background: #fff; color: #000; }
        .guest-btn { background: var(--border); color: #fff; }
        
        /* Main Layout */
        #app { display: none; flex-direction: column; height: 100vh; }
        header { padding: 15px 25px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .msg { display: flex; gap: 12px; align-items: flex-start; }
        .pfp { width: 40px; height: 40px; border-radius: 10px; background: #333; object-fit: cover; }
        .bubble { background: var(--surface); padding: 12px 16px; border-radius: 0 15px 15px 15px; border: 1px solid var(--border); max-width: 70%; }
        .meta { font-size: 0.75rem; font-weight: 700; margin-bottom: 5px; display: flex; gap: 10px; }
        
        /* Input Area */
        .input-area { padding: 20px; background: var(--bg); border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
        input[type="text"] { flex-grow: 1; background: var(--surface); border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: #fff; outline: none; }
        .file-label { cursor: pointer; color: var(--primary); font-size: 1.5rem; }
        #file-input { display: none; }
        
        .file-link { color: var(--primary); text-decoration: none; font-weight: bold; border: 1px dashed var(--primary); padding: 5px 10px; border-radius: 5px; display: inline-block; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h1>ClassChat</h1>
            <input type="text" id="guest-name" placeholder="Guest Nickname" style="width:90%; padding:10px; margin-bottom:10px; border-radius:5px; border:1px solid #444; background:#222; color:#fff;">
            <input type="color" id="guest-color" value="#00d2ff" style="width:100%; height:40px; margin-bottom:20px; border:none; background:none; cursor:pointer;">
            <button class="auth-btn guest-btn" onclick="loginGuest()">Enter as Guest</button>
            <div style="margin: 15px 0; opacity: 0.5;">OR</div>
            <button class="auth-btn google-btn" onclick="loginGoogle()">Sign in with Google</button>
        </div>
    </div>

    <div id="app">
        <header>
            <div style="font-weight: 800; color: var(--primary);">CLASSCHAT PRO</div>
            <div id="user-display" style="font-size: 0.8rem; opacity: 0.7;"></div>
        </header>

        <div id="chat-window"></div>

        <div class="input-area">
            <label for="file-input" class="file-label">📎</label>
            <input type="file" id="file-input">
            <input type="text" id="msgInput" placeholder="Type a message or upload file (max 200MB)...">
            <button id="sendBtn" style="background:var(--primary); border:none; padding:10px 20px; border-radius:10px; font-weight:bold; cursor:pointer;">SEND</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQb65vp77W_SkO8mdiVuwuRqHaHJkQ0yQ",
            authDomain: "classchat-afda9.firebaseapp.com",
            projectId: "classchat-afda9",
            storageBucket: "classchat-afda9.appspot.com", // Double check this in Storage tab!
            messagingSenderId: "760785144553",
            appId: "1:760785144553:web:213269aa2676ed3f5a7e78"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app, "https://classchat-afda9-default-rtdb.europe-west1.firebasedatabase.app");
        const auth = getAuth(app);
        const storage = getStorage(app);
        const provider = new GoogleAuthProvider();

        let currentUser = { name: "Guest", color: "#00d2ff", pfp: "https://api.dicebear.com/7.x/bottts/svg" };

        window.loginGuest = () => {
            currentUser.name = document.getElementById('guest-name').value || "Guest";
            currentUser.color = document.getElementById('guest-color').value;
            currentUser.pfp = `https://api.dicebear.com/7.x/identicon/svg?seed=${currentUser.name}`;
            startApp();
        };

        window.loginGoogle = () => {
            signInWithPopup(auth, provider).then((result) => {
                currentUser.name = result.user.displayName;
                currentUser.pfp = result.user.photoURL;
                currentUser.color = "#00d2ff";
                startApp();
            });
        };

        function startApp() {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('user-display').innerText = `Logged in as: ${currentUser.name}`;
        }

        const input = document.getElementById('msgInput');
        const fileInput = document.getElementById('file-input');

        async function handleSend() {
            const msg = input.value.trim();
            const file = fileInput.files[0];

            if (!msg && !file) return;

            let fileData = null;
            if (file) {
                if (file.size > 200 * 1024 * 1024) return alert("File too big (Max 200MB)");
                const storageRef = sRef(storage, 'uploads/' + Date.now() + '_' + file.name);
                const snapshot = await uploadBytes(storageRef, file);
                const url = await getDownloadURL(snapshot.ref);
                fileData = { url: url, name: file.name };
            }

            push(ref(db, "messages"), {
                sender: currentUser.name,
                text: msg,
                color: currentUser.color,
                pfp: currentUser.pfp,
                file: fileData,
                timestamp: Date.now()
            });

            input.value = "";
            fileInput.value = "";
        }

        document.getElementById('sendBtn').onclick = handleSend;
        input.onkeydown = (e) => { if(e.key === 'Enter') handleSend(); };

        onChildAdded(ref(db, "messages"), (snap) => {
            const d = snap.val();
            const div = document.createElement('div');
            div.className = 'msg';
            let content = d.text;
            if (d.file) {
                content += `<br><a href="${d.file.url}" target="_blank" class="file-link">📁 Download: ${d.file.name}</a>`;
            }
            div.innerHTML = `
                <img src="${d.pfp}" class="pfp">
                <div class="bubble">
                    <div class="meta" style="color:${d.color}">${d.sender}</div>
                    <div class="content">${content}</div>
                </div>
            `;
            document.getElementById('chat-window').appendChild(div);
            document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
        });

    </script>
</body>
</html>
