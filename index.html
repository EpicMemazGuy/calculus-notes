<!DOCTYPE html>
<html>
<head>
    <title>Calculus Notes - Section 4.2</title>
    <style>
        body { font-family: 'Times New Roman', serif; background: #fdfdfd; padding: 20px; color: #222; }
        #chat-window { height: 400px; border: 1px dashed #bbb; overflow-y: scroll; padding: 15px; background: #fff; margin-bottom: 10px; }
        .msg { margin-bottom: 8px; font-size: 14px; border-left: 3px solid #3498db; padding-left: 8px; }
        .sender { font-weight: bold; color: #2980b9; font-family: monospace; }
        .input-area { display: flex; gap: 5px; }
        input { flex-grow: 1; padding: 10px; border: 1px solid #ccc; }
        button { padding: 10px 20px; cursor: pointer; font-weight: bold; background: #eee; border: 1px solid #aaa; }
    </style>
</head>
<body>
    <h2>Unit 4: Limits and Continuous Functions</h2>
    <div id="chat-window"></div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Enter data..." autocomplete="off">
        <button id="sendBtn">21</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQb65vp77W_SkO8mdiVuwuRqHaHJkQ0yQ",
            authDomain: "classchat-afda9.firebaseapp.com",
            projectId: "classchat-afda9",
            storageBucket: "classchat-afda9.firebasestorage.app",
            messagingSenderId: "760785144553",
            appId: "1:760785144553:web:213269aa2676ed3f5a7e78"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, "messages");
        const username = prompt("Agent Name:") || "User" + Math.floor(Math.random()*100);

        const input = document.getElementById("msgInput");
        const windowDiv = document.getElementById("chat-window");

        document.getElementById("sendBtn").onclick = () => {
            if (input.value.trim()) {
                push(chatRef, { sender: username, message: input.value });
                input.value = "";
            }
        };

        onChildAdded(chatRef, (snap) => {
            const data = snap.val();
            const div = document.createElement("div");
            div.className = "msg";
            div.innerHTML = `<span class="sender">${data.sender}:</span> <span>${data.message}</span>`;
            windowDiv.appendChild(div);
            windowDiv.scrollTop = windowDiv.scrollHeight;
        });

        window.onkeydown = (e) => { if(e.key === "Escape") window.location.href = "https://en.wikipedia.org/wiki/Calculus"; };
    </script>
</body>
</html>
